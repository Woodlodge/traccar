  docker:
    name: Docker
    # needs: [test, build-other]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Google Auth
        id: auth
        uses: 'google-github-actions/auth@v3'
        with:
          token_format: 'access_token'
          workload_identity_provider: '${{ secrets.WIF_PROVIDER }}' # e.g. - projects/123456789/locations/global/workloadIdentityPools/my-pool/providers/my-provider
          service_account: '${{ secrets.WIF_SERVICE_ACCOUNT }}' # e.g. - my-service-account@my-project.iam.gserviceaccount.com
      - uses: actions/download-artifact@v8
        with:
          name: installers-other
          path: docker
      - name: Docker Auth
        id: docker-auth
        uses: 'docker/login-action@v4'
        with:
          username: 'oauth2accesstoken'
          password: '${{ steps.auth.outputs.access_token }}'
          registry: 'europe-west2-docker.pkg.dev'

      - name: Build and Push Container
        run: |
          docker build -f docker/Dockerfile.alpine -t "europe-west2-docker.pkg.dev/woodlodge-api/traccar/traccar:${{ github.ref_name }}" --build-arg VERSION=${{ github.ref_name }} ./
          docker push "europe-west2-docker.pkg.dev/woodlodge-api/traccar/traccar:${{ github.ref_name }}"

