name: Build Release

on:
  release:
    types: [released]
  workflow_dispatch:
    inputs:
      version:
        description: Version
        required: true
        default: preview

jobs:
  build-server:
    name: Build server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
          cache: gradle
      - run: ./gradlew assemble
      - name: Stage server payload
        shell: bash
        run: |
          mkdir -p out/{conf,lib,schema,templates}
          cp target/tracker-server.jar out/
          cp target/lib/* out/lib/
          cp schema/* out/schema/
          cp -r templates/* out/templates/
          cp setup/traccar.xml out/conf/
      - uses: actions/upload-artifact@v7
        with:
          name: staged-server
          path: out
          retention-days: 1

  build-web:
    name: Build web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          repository: traccar/traccar-web
          # ref: ${{ github.ref_name }}
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci && npm run build
      - name: Stage web payload
        shell: bash
        run: |
          mkdir -p out/web out/templates/translations
          cp -r build/* out/web/
          cp -r src/resources/l10n/* out/templates/translations/
      - uses: actions/upload-artifact@v7
        with:
          name: staged-web
          path: out
          retention-days: 1

